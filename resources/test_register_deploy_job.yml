resources:
  jobs:
    test_register_deploy:
      name: "[${bundle.target}] Test Register + Deploy"

      tasks:
        - task_key: "register"
          spark_python_task:
            python_file: ../scripts/register_model.py
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
              - "--model_name"
              - "${var.model_name}"
              - "--mlflow_run_id_file"
              - "${var.data_volume_path}/checkpoints/mlflow_run_id.txt"
          environment_key: "default"

        - task_key: "deploy"
          depends_on:
            - task_key: "register"
          spark_python_task:
            python_file: ../scripts/deploy_endpoint.py
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
              - "--model_name"
              - "${var.model_name}"
              - "--endpoint_name"
              - "${var.endpoint_name}"
          environment_key: "default"

      environments:
        - environment_key: "default"
          spec:
            client: "1"
            dependencies:
              - "torch>=2.0"
              - "einops>=0.7"
              - "timm>=1.0"
              - "mlflow>=2.10"
              - "databricks-sdk>=0.20"
