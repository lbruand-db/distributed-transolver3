  # Prerequisites (run these jobs first):
  #   1. download_drivaer_raw  — download raw VTP files from HuggingFace
  #   2. convert_vtp_to_npz    — convert VTP to NPZ format
resources:
  jobs:
    transolver3_training_pipeline:
      name: "[${bundle.target}] Transolver-3 Training Pipeline"

      environments:
        - environment_key: "lightweight"
          spec:
            client: "1"
            dependencies: []

      tasks:
        - task_key: "generate_split"
          description: "Generate deterministic 400/50/34 train/test/val split (paper Appendix A.2)"
          spark_python_task:
            python_file: ../scripts/generate_split.py
            parameters:
              - "--data_dir"
              - "${var.data_volume_path}"
              - "--seed"
              - "42"
              - "--n_train"
              - "400"
              - "--n_test"
              - "50"
              - "--n_val"
              - "34"
          environment_key: "lightweight"

        - task_key: "preprocess"
          depends_on:
            - task_key: "generate_split"
          description: "Compute mesh statistics and register metadata in Delta"
          spark_python_task:
            python_file: ../scripts/preprocess.py
            parameters:
              - "--data_dir"
              - "${var.data_volume_path}"
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          new_cluster:
            spark_version: "15.4.x-gpu-ml-scala2.12"
            node_type_id: "i3.4xlarge"
            num_workers: 0
            data_security_mode: "SINGLE_USER"
            aws_attributes:
              availability: "ON_DEMAND"
              zone_id: "auto"
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: "SingleNode"
          libraries:
            - pypi:
                package: "einops==0.8.2"
            - pypi:
                package: "timm==1.0.25"

        - task_key: "train"
          depends_on:
            - task_key: "preprocess"
          description: "Distributed mesh-sharded training with TorchDistributor"
          spark_python_task:
            python_file: ../Industrial-Scale-Benchmarks/exp_drivaer_ml_distributed.py
            parameters:
              - "--data_dir"
              - "${var.data_volume_path}"
              - "--field"
              - "${var.field}"
              - "--use-distributor"
              - "--num-gpus"
              - "${var.num_gpus}"
              - "--epochs"
              - "500"
              - "--patience"
              - "5"
              - "--shard-eval"
              - "--amp"
              - "--no-scale-lr"
              - "--save_dir"
              - "${var.data_volume_path}/checkpoints"
          new_cluster:
            spark_version: "15.4.x-gpu-ml-scala2.12"
            node_type_id: ${var.node_type_id}
            num_workers: 0
            data_security_mode: "SINGLE_USER"
            aws_attributes:
              availability: "ON_DEMAND"
              zone_id: "auto"
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
              spark.task.resource.gpu.amount: "${var.num_gpus}"
            spark_env_vars:
              PYTHONPATH: "${workspace.file_path}:${workspace.file_path}/Industrial-Scale-Benchmarks"
              PYTHONUNBUFFERED: "1"
              NCCL_DEBUG: "WARN"
              NCCL_P2P_DISABLE: "1"
              NCCL_ASYNC_ERROR_HANDLING: "1"
            custom_tags:
              ResourceClass: "SingleNode"
          libraries:
            - pypi:
                package: "einops==0.8.2"
            - pypi:
                package: "timm==1.0.25"
            - pypi:
                package: "mlflow==2.22.0"

        - task_key: "evaluate"
          depends_on:
            - task_key: "train"
          description: "Evaluate trained model on test set"
          spark_python_task:
            python_file: ../Industrial-Scale-Benchmarks/exp_drivaer_ml_distributed.py
            parameters:
              - "--data_dir"
              - "${var.data_volume_path}"
              - "--field"
              - "${var.field}"
              - "--eval_only"
              - "--mlflow_run_id_file"
              - "${var.data_volume_path}/checkpoints/mlflow_run_id.txt"
          new_cluster:
            spark_version: "15.4.x-gpu-ml-scala2.12"
            # Single GPU is sufficient: --eval_only uses CachedInference (no distributor),
            # processing the mesh in 100K-point chunks. g5.xlarge (1x A10G 24 GB) fits easily.
            node_type_id: "g5.xlarge"
            num_workers: 0
            data_security_mode: "SINGLE_USER"
            aws_attributes:
              availability: "ON_DEMAND"
              zone_id: "auto"
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
            spark_env_vars:
              PYTHONPATH: "${workspace.file_path}:${workspace.file_path}/Industrial-Scale-Benchmarks"
            custom_tags:
              ResourceClass: "SingleNode"
          libraries:
            - pypi:
                package: "einops==0.8.2"
            - pypi:
                package: "timm==1.0.25"
            - pypi:
                package: "mlflow==2.22.0"

        - task_key: "register"
          depends_on:
            - task_key: "evaluate"
          description: "Promote trained model to UC Model Registry"
          spark_python_task:
            python_file: ../scripts/register_model.py
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
              - "--model_name"
              - "${var.model_name}-${var.field}"
              - "--mlflow_run_id_file"
              - "${var.data_volume_path}/checkpoints/mlflow_run_id.txt"
          new_cluster:
            spark_version: "15.4.x-gpu-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            data_security_mode: "SINGLE_USER"
            aws_attributes:
              availability: "ON_DEMAND"
              zone_id: "auto"
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: "SingleNode"
          libraries:
            - pypi:
                package: "mlflow==2.22.0"

        - task_key: "deploy"
          depends_on:
            - task_key: "register"
          description: "Deploy model to serving endpoint"
          spark_python_task:
            python_file: ../scripts/deploy_endpoint.py
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
              - "--model_name"
              - "${var.model_name}-${var.field}"
              - "--endpoint_name"
              - "${var.endpoint_name}-${var.field}"
          new_cluster:
            spark_version: "15.4.x-gpu-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            data_security_mode: "SINGLE_USER"
            aws_attributes:
              availability: "ON_DEMAND"
              zone_id: "auto"
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: "SingleNode"
          libraries:
            - pypi:
                package: "einops==0.8.2"
            - pypi:
                package: "timm==1.0.25"
            - pypi:
                package: "databricks-sdk>=0.20"
