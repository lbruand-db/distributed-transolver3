resources:
  jobs:
    download_drivaer_raw:
      name: "[${bundle.target}] Download Raw DrivAerML from HuggingFace"

      tasks:
        - task_key: "download"
          description: "Download raw VTP + CSV files from HuggingFace into UC Volume"
          spark_python_task:
            python_file: ../scripts/download_drivaer_raw.py
            parameters:
              - "--output_dir"
              - "${var.data_volume_path}"
              - "--workers"
              - "8"
          environment_key: "default"

      environments:
        - environment_key: "default"
          spec:
            client: "1"
            dependencies:
              - "huggingface_hub>=0.20"
